{% extends "base.html" %}
{% block content %}
  <body onload="addButton()">
    <div>
      <h1>Cron Schedules</h1>
      <hr>

      <!-- ── Schedule wizard: plain-language creation; the raw table below
           remains the power-user view (custom commands, exotic cron). ── -->
      <div style="border:1px solid var(--sp-border);border-radius:8px;padding:14px 16px;margin:0 0 14px;background:var(--sp-surface);max-width:900px;">
        <h4 style="margin:0 0 10px;">&#10024; New Schedule</h4>

        <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:10px;">
          <b>1. What?</b>
          <select id="wiz-action" class="form-select form-select-sm" style="width:auto;" onchange="wizActionChange()">
            <option value="scene">Activate a scene</option>
            <option value="allstop">All Stop — silence everything</option>
            <option value="volume">Set the volume</option>
            <option value="repeat_on">Music repeat ON</option>
            <option value="repeat_off">Music repeat OFF</option>
            <option value="reboot">Restart the computer</option>
            <option value="update">Update ScenePlay &amp; restart</option>
          </select>
          <select id="wiz-scene" class="form-select form-select-sm" style="width:auto;">
            {% for s in scenes %}<option value="{{ s.scene_ID }}">{{ s.sceneName }}</option>{% endfor %}
          </select>
          <span id="wiz-volume-wrap" style="display:none;">
            <input type="number" id="wiz-volume" value="50" min="0" max="100"
                   class="form-control form-control-sm" style="width:80px;display:inline-block;"> %
          </span>
        </div>

        <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:10px;">
          <b>2. When?</b>
          <input type="time" id="wiz-time" value="18:00" class="form-control form-control-sm" style="width:auto;" onchange="wizPreview()">
          <span>
            <button type="button" class="btn btn-sm btn-outline-secondary" onclick="wizDays([0,1,2,3,4,5,6])">Every day</button>
            <button type="button" class="btn btn-sm btn-outline-secondary" onclick="wizDays([1,2,3,4,5])">Weekdays</button>
            <button type="button" class="btn btn-sm btn-outline-secondary" onclick="wizDays([0,6])">Weekends</button>
          </span>
          <span id="wiz-day-boxes" style="white-space:nowrap;">
            <!-- cron convention: 0 = Sunday -->
            <label style="margin-right:6px;"><input type="checkbox" class="wiz-day" value="0" checked onchange="wizPreview()"> Su</label>
            <label style="margin-right:6px;"><input type="checkbox" class="wiz-day" value="1" checked onchange="wizPreview()"> Mo</label>
            <label style="margin-right:6px;"><input type="checkbox" class="wiz-day" value="2" checked onchange="wizPreview()"> Tu</label>
            <label style="margin-right:6px;"><input type="checkbox" class="wiz-day" value="3" checked onchange="wizPreview()"> We</label>
            <label style="margin-right:6px;"><input type="checkbox" class="wiz-day" value="4" checked onchange="wizPreview()"> Th</label>
            <label style="margin-right:6px;"><input type="checkbox" class="wiz-day" value="5" checked onchange="wizPreview()"> Fr</label>
            <label style="margin-right:6px;"><input type="checkbox" class="wiz-day" value="6" checked onchange="wizPreview()"> Sa</label>
          </span>
        </div>

        <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center;">
          <b>3. Name</b>
          <input type="text" id="wiz-name" placeholder="(optional — auto-named)"
                 class="form-control form-control-sm" style="width:240px;">
          <button type="button" class="btn btn-success btn-sm" onclick="wizSave()">Save &amp; Apply</button>
          <span id="wiz-preview" style="color:var(--sp-muted);font-style:italic;"></span>
        </div>
        <div id="wiz-msg" style="margin-top:8px;"></div>
      </div>

      <div id="table"></div>
    </div>
    <script>
      const tableDiv = document.getElementById('table');

      // ── Schedule wizard ─────────────────────────────────────────────────
      const WIZ_ACTION_LABELS = {
        scene:      s => "activate scene '" + s + "'",
        allstop:    () => 'stop all music and video',
        volume:     () => 'set volume to ' + (document.getElementById('wiz-volume').value || '?') + '%',
        repeat_on:  () => 'turn music repeat ON',
        repeat_off: () => 'turn music repeat OFF',
        reboot:     () => 'restart the computer',
        update:     () => 'update ScenePlay and restart',
      };
      const WIZ_DAY_SHORT = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];

      function wizActionChange() {
        const a = document.getElementById('wiz-action').value;
        document.getElementById('wiz-scene').style.display       = a === 'scene'  ? '' : 'none';
        document.getElementById('wiz-volume-wrap').style.display = a === 'volume' ? '' : 'none';
        wizPreview();
      }

      function wizDays(days) {
        document.querySelectorAll('.wiz-day').forEach(cb => {
          cb.checked = days.includes(parseInt(cb.value));
        });
        wizPreview();
      }

      function wizSelectedDays() {
        return [...document.querySelectorAll('.wiz-day:checked')].map(cb => parseInt(cb.value));
      }

      function wizPreview() {
        const a = document.getElementById('wiz-action').value;
        const sceneSel = document.getElementById('wiz-scene');
        const sceneName = sceneSel.options[sceneSel.selectedIndex] ? sceneSel.options[sceneSel.selectedIndex].text : '?';
        const days = wizSelectedDays();
        const t = document.getElementById('wiz-time').value || '18:00';
        let when;
        if (days.length === 7) when = 'Every day';
        else if (days.join() === '1,2,3,4,5') when = 'Weekdays';
        else if (days.join() === '0,6') when = 'Weekends';
        else if (days.length === 0) when = '(pick at least one day)';
        else when = days.map(d => WIZ_DAY_SHORT[d]).join(', ');
        const [h, m] = t.split(':').map(Number);
        const ampm = ((h % 12) || 12) + ':' + String(m).padStart(2, '0') + ' ' + (h >= 12 ? 'PM' : 'AM');
        document.getElementById('wiz-preview').textContent =
          when + ' at ' + ampm + ' — ' + WIZ_ACTION_LABELS[a](sceneName);
      }

      async function wizSave() {
        const msg = document.getElementById('wiz-msg');
        msg.textContent = 'Saving…'; msg.style.color = 'var(--sp-muted)';
        const body = {
          action:   document.getElementById('wiz-action').value,
          scene_id: document.getElementById('wiz-scene').value,
          volume:   document.getElementById('wiz-volume').value,
          time:     document.getElementById('wiz-time').value,
          days:     wizSelectedDays(),
          name:     document.getElementById('wiz-name').value,
        };
        try {
          const r = await fetch('/api/cronwizard', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body),
          });
          const res = await r.json();
          if (res.success) {
            msg.style.color = '#28a745';
            msg.textContent = '✓ Scheduled and applied to the crontab: ' + res.description;
            setTimeout(() => window.location.reload(), 1200);
          } else {
            msg.style.color = '#dc3545';
            msg.textContent = '✗ ' + (res.error || 'Failed to save.');
          }
        } catch (e) {
          msg.style.color = '#dc3545';
          msg.textContent = '✗ Request failed: ' + e.message;
        }
      }
      wizActionChange();   // initialize picker visibility + preview

      function addButton() {
        var element = document.querySelector("div.gridjs-search");

        var addBtn = document.createElement("input");
        addBtn.className = "btn btn-primary";
        addBtn.setAttribute("type", "submit");
        addBtn.setAttribute("value", "Add New Row");
        addBtn.style = "float: right; margin-right: 10px;";
        addBtn.onclick = async function () {
          try {
            const response = await fetch('/api/cronscheduleaddrow', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
            });
            if (response.ok) {
              window.location.reload();
            } else {
              console.error('Failed to add row:', response.status);
            }
          } catch (error) {
            console.error('Error adding row:', error);
          }
        };

        var applyBtn = document.createElement("input");
        applyBtn.className = "btn btn-success";
        applyBtn.setAttribute("type", "submit");
        applyBtn.setAttribute("value", "Apply to Crontab");
        applyBtn.style = "float: right; margin-right: 10px;";
        applyBtn.onclick = async function () {
          if (confirm('Apply all active schedules to the system crontab? Existing ScenePlay-managed entries will be replaced.')) {
            try {
              const response = await fetch('/api/applycronschedules', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
              });
              const result = await response.json();
              if (result.success) {
                alert('Crontab updated successfully. ' + result.count + ' active schedule(s) applied.');
              } else {
                alert('Failed to update crontab: ' + (result.error || 'Unknown error'));
              }
            } catch (error) {
              console.error('Error applying crontab:', error);
              alert('An error occurred while applying the crontab.');
            }
          }
        };

        element.parentNode.insertBefore(applyBtn, element.nextSibling);
        element.parentNode.insertBefore(addBtn, applyBtn.nextSibling);
      }

      const activeDD = [
        { value: "1", label: "Yes" },
        { value: "0", label: "No" }
      ];

      const updateUrl = (prev, query) => {
        return prev + (prev.indexOf('?') >= 0 ? '&' : '?') + new URLSearchParams(query).toString();
      };

      const editableCellAttributes = (data, row, col) => {
        if (row) {
          return { contentEditable: 'true', 'data-element-id': row.cells[0].data };
        }
        return {};
      };

      // 0  schedule_id   INTEGER  PK
      // 1  name          TEXT
      // 2  minute        TEXT
      // 3  hour          TEXT
      // 4  day_of_month  TEXT
      // 5  month         TEXT
      // 6  day_of_week   TEXT
      // 7  command       TEXT
      // 8  description   TEXT
      // 9  active        INT
      const tblColumns = ['schedule_id', 'name', 'minute', 'hour', 'day_of_month', 'month', 'day_of_week', 'command', 'description', 'active'];
      const primeKey = tblColumns[0];

      new gridjs.Grid({
        columns: [
          { id: tblColumns[0], name: 'ID', hidden: true },
          { id: tblColumns[1], name: 'Name', sort: true, attributes: editableCellAttributes },
          { id: tblColumns[2], name: 'Minute', sort: false, attributes: editableCellAttributes },
          { id: tblColumns[3], name: 'Hour', sort: false, attributes: editableCellAttributes },
          { id: tblColumns[4], name: 'Day of Month', sort: false, attributes: editableCellAttributes },
          { id: tblColumns[5], name: 'Month', sort: false, attributes: editableCellAttributes },
          { id: tblColumns[6], name: 'Day of Week', sort: false, attributes: editableCellAttributes },
          { id: tblColumns[7], name: 'Command', sort: false, attributes: editableCellAttributes },
          { id: tblColumns[8], name: 'Description', sort: false, attributes: editableCellAttributes },
          {
            id: tblColumns[9], name: 'Active', sort: false,
            formatter: function (cellData, row) {
              const active = document.createElement("select");
              activeDD.forEach((d) => {
                var el = document.createElement("option");
                el.textContent = d.label;
                el.value = d.value;
                active.appendChild(el);
              });
              active.name = "active";
              active.id = "activeOpt_" + row.cells[9].data.toString() + "_ID_" + row.cells[0].data.toString();
              active.setAttribute("onchange", "activeChange()");
              active.childNodes.forEach((node) => {
                if (parseInt(node.value) === parseInt(row.cells[9].data)) {
                  node.outerHTML = node.outerHTML.replace("<option", "<option selected");
                }
              });
              return gridjs.html(active.outerHTML);
            }
          },
          {id: 'dlete', name: 'Del', sort: false,
          formatter: function (cellData, row) {
              // Multi-select delete: checkbox feeds the shared Set in site.js;
              // "Delete Selected" posts each id to the single-delete endpoint.
              return gridjs.html(spCheckHtml(row.cells[0].data));
              }
          },
        ],
        server: {
          url: '/api/cronSchedule',
          then: results => results.data,
          total: results => results.total,
        },
        search: {
          enabled: true,
          server: {
            url: (prev, search) => updateUrl(prev, { search }),
          },
        },
        sort: {
          enabled: true,
          multiColumn: true,
          server: {
            url: (prev, columns) => {
              const sort = columns.map(col => (col.direction === 1 ? '+' : '-') + tblColumns[col.index]);
              return updateUrl(prev, { sort });
            },
          },
        },
        pagination: {
          enabled: true,
          server: {
            url: (prev, page, limit) => updateUrl(prev, { start: page * limit, length: limit }),
          },
        },
      }).render(tableDiv);
      spInitBulkDelete('/api/cronscheduledelrow', primeKey);

      let savedValue;

      tableDiv.addEventListener('focusin', ev => {
        if (ev.target.tagName === 'TD') {
          savedValue = ev.target.textContent;
        }
      });

      tableDiv.addEventListener('focusout', ev => {
        if (ev.target.tagName === 'TD') {
          if (savedValue !== ev.target.textContent) {
            saveChange(JSON.stringify({
              [primeKey]: ev.target.dataset.elementId,
              [ev.target.dataset.columnId]: ev.target.textContent
            }));
          }
          savedValue = undefined;
        }
      });

      tableDiv.addEventListener('keydown', ev => {
        if (ev.target.tagName === 'TD') {
          if (ev.key === 'Escape') {
            ev.target.textContent = savedValue;
            ev.target.blur();
          } else if (ev.key === 'Enter') {
            ev.preventDefault();
            ev.target.blur();
          }
        }
      });

      function saveChange(json) {
        fetch('/api/cronSchedule', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: json,
        });
      }

      function activeChange() {
        var ev = event.target;
        var id = ev.id.split("_ID_");
        if (ev.id.includes("activeOpt_")) {
          var jsn = { [primeKey]: id[1], active: ev.value };
          saveChange(JSON.stringify(jsn));
        }
      }

    </script>
  </body>
{% endblock %}
