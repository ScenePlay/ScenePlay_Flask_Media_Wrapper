{% extends "base.html" %}
{% block content %}
  <body onload="addButton()">
    <div>
      <h1>Music Scene Table</h1>
      <h2><label style="display: inline-block; margin-left: 10px;" for="campaignDropdown">Filter By Scene:</label>
          <select id="editSceneDropdown" onchange="sceneFilterChange()" style="display: inline-block; margin-left: 10px;">
          <option value="0">All</option>
          {% for scene in scenes %}
            {% if scene[0] == sceneFilter %}
              <option selected value="{{scene[0]}}">{{scene[1]}}</option>
            {% 	else %}
              <option value="{{scene[0]}}">{{scene[1]}}</option>
            {% endif %}
          {% endfor %}
          </select>
        </h2>
      <hr>
      <div id="table"></div>
    </div>
    <script>
      const tableDiv = document.getElementById('table');

                      // alert(`Failed to add row: ${response.status}`);

                      // Request was successful
                      console.log('Row added successfully!');
                      // You can optionally parse the response if the server sends back data
                      // const data = await response.json();
                      // console.log('Response data:', data);
                  }
              } catch (error) {
                  // Handle network errors or other issues during fetch
                  console.error('Error during fetch operation:', error);
                  // Display a user-friendly error message
                  // alert('An error occurred while trying to add a new row.');
              }
          // button.onclick = function() {
          //     //alert("Button clicked!");
          //     fetch('/api/musicSceneaddrow', {
          //     method: 'GET',
          //     headers: {'Content-Type': 'application/json'},
          //     });
              window.location.reload();
          }
          element.parentNode.insertBefore(button, element.nextSibling);
      }
let sceneCache = null;
      let sceneCachePromise = null;

      function fetchScenes() {
        if (!sceneCachePromise) {
          sceneCachePromise = fetch('/api/scenes')
            .then(r => { if (!r.ok) throw new Error(`HTTP error! status: ${r.status}`); return r.json(); })
            .then(data => { sceneCache = data.data; return sceneCache; });
        }
        return sceneCachePromise;
      }

      function sceneNameFromCache(sceneId) {
        if (!sceneCache) return null;
        const found = sceneCache.find(item => parseInt(item.scene_ID) === parseInt(sceneId));
        return found ? found.sceneName : null;
      }

      function updateScenePlaceholders() {
        document.querySelectorAll('select[data-current-scene-id]:not([data-loaded="true"])').forEach(el => {
          const name = sceneNameFromCache(parseInt(el.dataset.currentSceneId));
          if (name && el.options.length === 1) el.options[0].textContent = name;
        });
      }

      // Fetch scenes in background so placeholders show real names without blocking render
      fetchScenes().then(updateScenePlaceholders).catch(err => console.error('Error fetching scenes:', err));

      async function loadSceneOptions(selectEl) {
        if (selectEl.dataset.loaded === 'true') return;

        try {
          await fetchScenes();
        } catch (error) {
          console.error('Error fetching scenes:', error);
          return;
        }

        const currentSceneId = parseInt(selectEl.dataset.currentSceneId);
        selectEl.innerHTML = '';

        const emptyOpt = document.createElement('option');
        emptyOpt.value = '0';
        emptyOpt.textContent = '';
        selectEl.appendChild(emptyOpt);

        sceneCache.forEach(item => {
          const opt = document.createElement('option');
          opt.value = item.scene_ID;
          opt.textContent = item.sceneName;
          if (parseInt(item.scene_ID) === currentSceneId) opt.selected = true;
          selectEl.appendChild(opt);
        });

        selectEl.dataset.loaded = 'true';
        updateScenePlaceholders();
      }

      let songCache = null;
      let songCachePromise = null;

      function fetchSongs() {
        if (!songCachePromise) {
          songCachePromise = fetch('api/music')
            .then(r => { if (!r.ok) throw new Error(`HTTP error! status: ${r.status}`); return r.json(); })
            .then(data => { songCache = data.data; return songCache; });
        }
        return songCachePromise;
      }

      // /api/music rows carry displayName + thumbnail + duration (metadata),
      // so the picker face and list need no extra endpoint.
      function songFromCache(songId) {
        if (!songCache) return null;
        return songCache.find(item => parseInt(item.song_ID) === parseInt(songId)) || null;
      }

      function songLabel(item) {
        return shortMediaName(item.displayName || item.song);
      }

      function updateSongPlaceholders() {
        document.querySelectorAll('button[data-current-song-id]').forEach(el => {
          const it = songFromCache(parseInt(el.dataset.currentSongId));
          if (it) spSetPickerBtn(el, songLabel(it), spSmallThumb(it.thumbnail));
        });
      }

      // Fetch songs in background so placeholders show real names without blocking render
      fetchSongs().then(updateSongPlaceholders).catch(err => console.error('Error fetching songs:', err));

      // Opens the ONE shared picker panel (site.js) — replaces the per-row
      // option lists that crashed the page at library size.
      function openSongPicker(btn) {
        fetchSongs().then(items => {
          spOpenMediaPicker(btn, {
            items: items,
            current: parseInt(btn.dataset.currentSongId),
            getId: it => it.song_ID,
            getName: songLabel,
            getThumb: it => spSmallThumb(it.thumbnail),
            getDur: it => fmtDur(it.duration),
            onPick: (id, it) => {
              saveChange(JSON.stringify({[primeKey]: btn.dataset.rowId, song_ID: id}));
              btn.dataset.currentSongId = id;
              spSetPickerBtn(btn, it ? songLabel(it) : '— select —', it ? spSmallThumb(it.thumbnail) : null);
            }
          });
        }).catch(err => console.error('Error fetching songs:', err));
      }

      const updateUrl = (prev, query) => {
        return prev + (prev.indexOf('?') >= 0 ? '&' : '?') + new URLSearchParams(query).toString();
      };

      const editableCellAttributes = (data, row, col) => {
          if (row) {
            return {contentEditable: 'true', 'data-element-id': row.cells[0].data};
          }
          else {
            return {};
          }
      };
      // cid  name           type     notnull  dflt_value  pk
      // ---  -------------  -------  -------  ----------  --
      // 0    musicScene_ID  INTEGER  0                    1 
      // 1    scene_ID       INT      0                    0 
      // 2    song_ID        INT      0                    0 
      // 3    orderBy        INT      0                    0 
      // 4    volume         INTEGER  0                    0 
      const tblColumns = ['musicScene_ID','scene_ID', 'song_ID','orderBy','volume']
      primeKey = tblColumns[0]
      const grid = new gridjs.Grid({
        columns: [
          { id: tblColumns[0],name: 'musicScene_ID', 'hidden': true },
          { id: tblColumns[1], name: 'Scenes', sort: false,
            formatter: function (cellData, row) {
              const sceneId = row.cells[1].data;
              const musicSceneId = row.cells[0].data;
              const select = document.createElement("select");
              select.name = "scenes";
              select.id = "selectSceneOpt_" + sceneId.toString() + "_ID_" + musicSceneId.toString();
              select.dataset.currentSceneId = sceneId;
              select.setAttribute("onchange", "sceneChange()");
              select.setAttribute("onfocus", "loadSceneOptions(this)");
              const placeholder = document.createElement('option');
              placeholder.value = sceneId;
              placeholder.textContent = (sceneId > 0) ? (sceneNameFromCache(sceneId) ?? '') : '';
              placeholder.selected = true;
              select.appendChild(placeholder);
              return gridjs.html(select.outerHTML);
            }
           },
          { id: tblColumns[2], name: 'Song' , sort: false,
            formatter: function (cellData, row) {
              // Face button (thumb + short metadata name); clicking opens the
              // shared picker. Cache usually loaded by later page renders, so
              // the face fills inline; first paint is patched by
              // updateSongPlaceholders once the fetch lands.
              const songId = row.cells[2].data;
              const musicSceneId = row.cells[0].data;
              const it = (songId > 0) ? songFromCache(songId) : null;
              const btn = document.createElement('button');
              btn.type = 'button';
              btn.className = 'sp-picker-btn';
              btn.dataset.currentSongId = songId;
              btn.dataset.rowId = musicSceneId;
              btn.setAttribute('onclick', 'openSongPicker(this)');
              const img = document.createElement('img');
              const thumb = it ? spSmallThumb(it.thumbnail) : null;
              if (thumb) { img.src = thumb; } else { img.style.display = 'none'; }
              btn.appendChild(img);
              const span = document.createElement('span');
              span.textContent = it ? songLabel(it) : ((songId > 0) ? '…' : '— select —');
              btn.appendChild(span);
              return gridjs.html(btn.outerHTML);
            }
          },
          { id: tblColumns[3], name: 'orderBy','attributes': editableCellAttributes},
          { id: tblColumns[4], name: 'Volume 0-100', sort: false,'attributes': editableCellAttributes},
          {id: 'dlete', name: 'Del', sort: false,
          formatter: function (cellData, row) {
              // Multi-select delete: checkbox feeds the shared Set in site.js;
              // "Delete Selected" posts each id to the single-delete endpoint.
              return gridjs.html(spCheckHtml(row.cells[0].data));
              }
          },
        ],
        server: {
          url: '/api/musicScene',
          then: results => results.data,
          total: results => results.total,
        },
        search: {
          enabled: true,
          server: {
            url: (prev, search) => {
              return updateUrl(prev, {search});
            },
          },
        },
        sort: {
          enabled: true,
          multiColumn: true,
          server: {
            url: (prev, columns) => {
              const columnIds = tblColumns;
              const sort = columns.map(col => (col.direction === 1 ? '+' : '-') + columnIds[col.index]);
              return updateUrl(prev, {sort});
            },
          },
        },
        pagination: {
          enabled: true,
          server: {
            url: (prev, page, limit) => {
              return updateUrl(prev, {start: page * limit, length: limit});
            },
          },
        },
      }).render(tableDiv);
      spInitBulkDelete('/api/musicScenedelrow', primeKey);

      grid.on('ready', () => {
        updateScenePlaceholders();
        updateSongPlaceholders();
      });

      let savedValue;

      tableDiv.addEventListener('focusin', ev => {
        if (ev.target.tagName === 'TD') {
          savedValue = ev.target.textContent;
        }
      });

      tableDiv.addEventListener('focusout', ev => {
        if (ev.target.tagName === 'TD') {
          if (savedValue !== ev.target.textContent) {
            saveChange(JSON.stringify({[primeKey]: ev.target.dataset.elementId,[ev.target.dataset.columnId]: ev.target.textContent
              }))
          }
          savedValue = undefined;
        }
      });

      function saveChange(json){
        //console.log(json)
        fetch('/api/musicScene', {
              method: 'POST',
              headers: {'Content-Type': 'application/json'},
              body: json,
            });
      }

      function sceneChange(){
        var ev = event.target;
        id = ev.id.split("_ID_")
        if(ev.id.toString().includes("selectSceneOpt_")){
          jsn = {[primeKey]:id[1],scene_ID:ev.value}
          console.log(JSON.stringify(jsn))
          saveChange(JSON.stringify(jsn))
          //console.log("Selected " + ev.value);
        }
      }

      tableDiv.addEventListener('keydown', ev => {
        if (ev.target.tagName === 'TD') {
          if (ev.key === 'Escape') {
            ev.target.textContent = savedValue;
            ev.target.blur();
          }
          else if (ev.key === 'Enter') {
            ev.preventDefault();
            ev.target.blur();
          }
        }
      });
      // function dlete(){
      //   if (confirm('Are you sure you want to DELETE?')) {
      //   var ev = event.target;
      //   id = ev.id.split("_ID_")
      //   if(ev.id.toString().includes("Dlete_")){
      //     jsn = {[primeKey]:id[1]}
      //     console.log(JSON.stringify(jsn))
        
      //       jsn = {[primeKey]:id[1]}
      //       console.log(JSON.stringify(jsn))
      //       fetch('/api/musicScenedelrow', {
      //         method: 'POST',
      //         headers: {'Content-Type': 'application/json'},
      //         body: JSON.stringify(jsn),
      //       });
      //       window.location.reload();
      //   } else {
      //     // Do nothing!
      //     console.log('Thing was not saved to the database.');
      //   }
      //     //saveChange(JSON.stringify(jsn))
      //     //console.log("Selected " + jsn);
      //   }
      // }

    </script>
  </body>
  {% endblock %}
