{% extends "base.html" %}
{% block content %}
  <body onload="addButton()">
    <div>
      <h1>Video Scene Table</h1>
      <h2><label style="display: inline-block; margin-left: 10px;" for="campaignDropdown">Filter By Scene:</label>
        <select id="editSceneDropdown" onchange="sceneFilterChange()" style="display: inline-block; margin-left: 10px;">
        <option value="0">All</option>
        {% for scene in scenes %}
          {% if scene[0] == sceneFilter %}
            <option selected value="{{scene[0]}}">{{scene[1]}}</option>
          {% 	else %}
            <option value="{{scene[0]}}">{{scene[1]}}</option>
          {% endif %}
        {% endfor %}
        </select>
      </h2>
      <hr>
      <div id="table"></div>
    </div>
    <script>
      const tableDiv = document.getElementById('table');
      function addButton() {

                      // const data = await response.json();

              } catch (error) {

                  console.error('Error during fetch operation:', error);

                  // alert('An error occurred while trying to add a new row.');
              }
          // button.onclick = function() {
          //     //alert("Button clicked!");
          //     fetch('/api/videoSceneaddrow', {
          //     method: 'GET',
          //     headers: {'Content-Type': 'application/json'},
          //     });
              window.location.reload();
          }
          element.parentNode.insertBefore(button, element.nextSibling);
      }
let sceneCache = null;
      let sceneCachePromise = null;

      function fetchScenes() {
        if (!sceneCachePromise) {
          sceneCachePromise = fetch('/api/scenes')
            .then(r => { if (!r.ok) throw new Error(`HTTP error! status: ${r.status}`); return r.json(); })
            .then(data => { sceneCache = data.data; return sceneCache; });
        }
        return sceneCachePromise;
      }

      function sceneNameFromCache(sceneId) {
        if (!sceneCache) return null;
        const found = sceneCache.find(item => parseInt(item.scene_ID) === parseInt(sceneId));
        return found ? found.sceneName : null;
      }

      function updateScenePlaceholders() {
        document.querySelectorAll('select[data-current-scene-id]:not([data-loaded="true"])').forEach(el => {
          const name = sceneNameFromCache(parseInt(el.dataset.currentSceneId));
          if (name && el.options.length === 1) el.options[0].textContent = name;
        });
      }

      // Fetch scenes in background so placeholders show real names without blocking render
      fetchScenes().then(updateScenePlaceholders).catch(err => console.error('Error fetching scenes:', err));

      async function loadSceneOptions(selectEl) {
        if (selectEl.dataset.loaded === 'true') return;

        try {
          await fetchScenes();
        } catch (error) {
          console.error('Error fetching scenes:', error);
          return;
        }

        const currentSceneId = parseInt(selectEl.dataset.currentSceneId);
        selectEl.innerHTML = '';

        const emptyOpt = document.createElement('option');
        emptyOpt.value = '0';
        emptyOpt.textContent = '';
        selectEl.appendChild(emptyOpt);

        sceneCache.forEach(item => {
          const opt = document.createElement('option');
          opt.value = item.scene_ID;
          opt.textContent = item.sceneName;
          if (parseInt(item.scene_ID) === currentSceneId) opt.selected = true;
          selectEl.appendChild(opt);
        });

        selectEl.dataset.loaded = 'true';
        updateScenePlaceholders();
      }

      let videoCache = null;
      let videoCachePromise = null;

      function fetchVideos() {
        if (!videoCachePromise) {
          videoCachePromise = fetch('api/videomedia')
            .then(r => { if (!r.ok) throw new Error(`HTTP error! status: ${r.status}`); return r.json(); })
            .then(data => { videoCache = data.data; return videoCache; });
        }
        return videoCachePromise;
      }

      function videoNameFromCache(videoId) {
        if (!videoCache) return null;
        const found = videoCache.find(item => parseInt(item.video_ID) === parseInt(videoId));
        return found ? found.title : null;
      }

      function updateVideoPlaceholders() {
        document.querySelectorAll('select[data-current-video-id]:not([data-loaded="true"])').forEach(el => {
          const name = videoNameFromCache(parseInt(el.dataset.currentVideoId));
          if (name && el.options.length === 1) el.options[0].textContent = name;
        });
      }

      // Fetch videos in background so placeholders show real titles without blocking render
      fetchVideos().then(updateVideoPlaceholders).catch(err => console.error('Error fetching videos:', err));

      async function loadVideoOptions(selectEl) {
        if (selectEl.dataset.loaded === 'true') return;

        try {
          await fetchVideos();
        } catch (error) {
          console.error('Error fetching videos:', error);
          return;
        }

        const currentVideoId = parseInt(selectEl.dataset.currentVideoId);
        selectEl.innerHTML = '';

        const emptyOpt = document.createElement('option');
        emptyOpt.value = '0';
        emptyOpt.textContent = '';
        selectEl.appendChild(emptyOpt);

        videoCache.forEach(item => {
          const opt = document.createElement('option');
          opt.value = item.video_ID;
          opt.textContent = item.title;
          if (parseInt(item.video_ID) === currentVideoId) opt.selected = true;
          selectEl.appendChild(opt);
        });

        selectEl.dataset.loaded = 'true';
        updateVideoPlaceholders();
      }

      const updateUrl = (prev, query) => {
        return prev + (prev.indexOf('?') >= 0 ? '&' : '?') + new URLSearchParams(query).toString();
      };

      const editableCellAttributes = (data, row, col) => {
          if (row) {
            return {contentEditable: 'true', 'data-element-id': row.cells[0].data};
          }
          else {
            return {};
          }
      };
      
      //       # cid  name              type     notnull  dflt_value  pk
      // # ---  ----------------  -------  -------  ----------  --
      // # 0    videoScene_ID     INTEGER  0                    1 
      // # 1    scene_ID          INT      0                    0 
      // # 2    video_ID          INT      0                    0 
      // # 3    DisplayScreen_ID  INT      0                    0 
      // # 4    orderBy           INT      0                    0 
      // # 5    volume            INT      0                    0 
      // # 6    loops             INT      0                    0

      const tblColumns = ['videoScene_ID','scene_ID','video_ID', 'DisplayScreen_ID', 'orderBy', 'volume', 'loops'];
      primeKey = tblColumns[0]
      const grid = new gridjs.Grid({
        columns: [
          { id: tblColumns[0],name: 'videoScene_ID', 'hidden': true },
          { id: tblColumns[1], name: 'Scene', sort: true,
            formatter: function (cellData, row) {
              const sceneId = row.cells[1].data;
              const videoSceneId = row.cells[0].data;
              const select = document.createElement("select");
              select.name = "scenes";
              select.id = "selectSceneOpt_" + sceneId.toString() + "_ID_" + videoSceneId.toString();
              select.dataset.currentSceneId = sceneId;
              select.setAttribute("onchange", "sceneChange()");
              select.setAttribute("onfocus", "loadSceneOptions(this)");
              const placeholder = document.createElement('option');
              placeholder.value = sceneId;
              placeholder.textContent = (sceneId > 0) ? (sceneNameFromCache(sceneId) ?? '') : '';
              placeholder.selected = true;
              select.appendChild(placeholder);
              return gridjs.html(select.outerHTML);
            }
           },
          { id: tblColumns[2], name: 'Video', sort: false,
            formatter: function (cellData, row) {
              const videoId = row.cells[2].data;
              const videoSceneId = row.cells[0].data;
              const selectVideo = document.createElement("select");
              selectVideo.name = "videoMedia";
              selectVideo.id = "selectVideoOpt_" + videoId.toString() + "_ID_" + videoSceneId.toString();
              selectVideo.dataset.currentVideoId = videoId;
              selectVideo.setAttribute("onchange", "videomediaChange()");
              selectVideo.setAttribute("onfocus", "loadVideoOptions(this)");
              const placeholder = document.createElement('option');
              placeholder.value = videoId;
              placeholder.textContent = (videoId > 0) ? (videoNameFromCache(videoId) ?? '') : '';
              placeholder.selected = true;
              selectVideo.appendChild(placeholder);
              return gridjs.html(selectVideo.outerHTML);
            }
          },
          { id: tblColumns[3], name: 'Display Screen','attributes': editableCellAttributes},
          { id: tblColumns[4], name: 'orderBy','attributes': editableCellAttributes},
          { id: tblColumns[5], name: 'Volume 0-100', sort: false,'attributes': editableCellAttributes},
          { id: tblColumns[6], name: 'Loops 0-9999', sort: false,'attributes': editableCellAttributes},
          {id: 'dlete', name: 'Delete' , sort: false,
          formatter: function (cellData, row) { 
              const selectedValue = cellData
              const dlete = document.createElement("input");
              dlete.name = "Dlete"
              dlete.id = "Dlete"+ "_ID_" + row.cells[0].data.toString()
              dlete.setAttribute("type","submit")           
              dlete.setAttribute("onclick","dlete(event)")
              dlete.setAttribute("value","Delete")
              dlete.className = "btn btn-primary";
              return gridjs.html(dlete.outerHTML);
              } 
          },
        ],
        server: {
          url: '/api/videoScene',
          then: results => results.data,
          total: results => results.total,
        },
        search: {
          enabled: true,
          server: {
            url: (prev, search) => {
              return updateUrl(prev, {search});
            },
          },
        },
        sort: {
          enabled: true,
          multiColumn: true,
          server: {
            url: (prev, columns) => {
              const columnIds = tblColumns;
              const sort = columns.map(col => (col.direction === 1 ? '+' : '-') + columnIds[col.index]);
              return updateUrl(prev, {sort});
            },
          },
        },
        pagination: {
          enabled: true,
          server: {
            url: (prev, page, limit) => {
              return updateUrl(prev, {start: page * limit, length: limit});
            },
          },
        },
      }).render(tableDiv);

      grid.on('ready', () => {
        updateScenePlaceholders();
        updateVideoPlaceholders();
      });

      let savedValue;

      tableDiv.addEventListener('focusin', ev => {
        if (ev.target.tagName === 'TD') {
          savedValue = ev.target.textContent;
        }
      });

      tableDiv.addEventListener('focusout', ev => {
        if (ev.target.tagName === 'TD') {
          if (savedValue !== ev.target.textContent) {
            saveChange(JSON.stringify({[primeKey]: ev.target.dataset.elementId,[ev.target.dataset.columnId]: ev.target.textContent
              }))
          }
          savedValue = undefined;
        }
      });

      function saveChange(json){
        //console.log(json)
        fetch('/api/videoScene', {
              method: 'POST',
              headers: {'Content-Type': 'application/json'},
              body: json,
            });
      }

      function sceneChange(){
        var ev = event.target;
        id = ev.id.split("_ID_")
        if(ev.id.toString().includes("selectSceneOpt_")){
          jsn = {[primeKey]:id[1],scene_ID:ev.value}
          console.log(JSON.stringify(jsn))
          saveChange(JSON.stringify(jsn))
          //console.log("Selected " + ev.value);
        }
      }

      function videomediaChange(){
        var ev = event.target;
        id = ev.id.split("_ID_")
        console.log("hi" + id)
        if(ev.id.toString().includes("selectVideoOpt_")){
          jsn = {[primeKey]:id[1],video_ID:ev.value}
          console.log(JSON.stringify(jsn))
          saveChange(JSON.stringify(jsn))
          //console.log("Selected " + ev.value);
        }
      }


      tableDiv.addEventListener('keydown', ev => {
        if (ev.target.tagName === 'TD') {
          if (ev.key === 'Escape') {
            ev.target.textContent = savedValue;
            ev.target.blur();
          }
          else if (ev.key === 'Enter') {
            ev.preventDefault();
            ev.target.blur();
          }
        }
      });



        async function dlete(event) {
        if (confirm('Are you sure you want to DELETE?')) {
          const ev = event.target;
          const idParts = ev.id.split("_ID_");

          if (ev.id.includes("Dlete_") && idParts.length > 1) {
            const rowId = idParts[1];
            const payload = { [primeKey]: rowId };

            try {
              const response = await fetch('/api/videoScenedelrow', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload),
              });

              if (response.ok) {
                window.location.reload();
              } else {
                alert(`Failed to delete row: ${response.statusText}`);
              }
            } catch (error) {
              console.error('Error during delete operation:', error);
              alert('An error occurred while trying to delete the row.');
            }
          }
        }
      }

    </script>
