{% extends 'ttrpg/base_ttrpg.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="ttrpg-card p-4">
            <h4 style="color: var(--ttrpg-accent);">Change Password</h4>

            {% if error %}
                <div class="alert alert-danger">{{ error }}</div>
            {% endif %}
            {% if success %}
                <div class="alert alert-success">{{ success }}</div>
            {% endif %}

            <form method="POST">
                <div class="mb-3">
                    <label class="form-label">Current Password</label>
                    <input type="password" name="current_password"
                           class="form-control bg-dark text-light border-secondary" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">New Password</label>
                    <input type="password" name="new_password"
                           class="form-control bg-dark text-light border-secondary" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Confirm New Password</label>
                    <input type="password" name="confirm_password"
                           class="form-control bg-dark text-light border-secondary" required>
                </div>
                <button type="submit" class="btn btn-ttrpg w-100">Update Password</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
