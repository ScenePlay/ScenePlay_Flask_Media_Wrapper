{% extends "base.html" %}
{% block content %}
  <body onload="addButton()">
    <div>
      <h1>Server IP Table</h1>
      <!-- LAN scan (discovery.py): finds ScenePlay + WLED boxes and upserts
           them below. Runs server-side in the background; the bar polls
           /api/pingnetwork/status. -->
      <div style="display:flex;align-items:center;gap:10px;margin:6px 0;">
        <input type="button" id="pingNetworkBtn" class="btn btn-primary" value="Ping Network">
        <div id="pingBarWrap" style="display:none;flex:1;max-width:420px;height:10px;
             background:var(--sp-bg);border:1px solid var(--sp-border);border-radius:5px;overflow:hidden;">
          <div id="pingBar" style="height:100%;width:0%;background:var(--sp-accent);transition:width .3s;"></div>
        </div>
        <span id="pingStatus" style="font-size:.85em;color:var(--sp-muted);"></span>
      </div>
      <hr>
      <div id="table"></div>
    </div>
    <script>
      const tableDiv = document.getElementById('table');

      // ── Ping Network: background LAN scan with a live progress bar ────
      const pingBtn = document.getElementById('pingNetworkBtn');
      let pingTimer = null;

      function renderPingStatus(p) {
        const wrap  = document.getElementById('pingBarWrap');
        const bar   = document.getElementById('pingBar');
        const label = document.getElementById('pingStatus');
        if (p.state === 'sweeping' || p.state === 'identifying') {
          wrap.style.display = '';
          const pct = p.total ? Math.round(100 * p.done / p.total) : 0;
          bar.style.width = pct + '%';
          label.textContent = p.state === 'sweeping'
            ? `scanning ${p.done}/${p.total} host:port probes…`
            : `identifying ${p.done}/${p.total} responders…`;
          return false;                       // still running
        }
        if (p.state === 'done' && p.summary) {
          wrap.style.display = '';
          bar.style.width = '100%';
          const s = p.summary;
          label.textContent = `done — ${s.sceneplay} ScenePlay, ${s.wled} WLED (${s.created} new, ${s.updated} updated)`;
        } else if (p.state === 'error') {
          label.textContent = 'scan failed — check the server log';
        }
        return true;                          // finished (or idle)
      }

      function pollPing() {
        fetch('/api/pingnetwork/status')
          .then(r => r.json())
          .then(p => {
            if (renderPingStatus(p)) {
              clearInterval(pingTimer);
              pingTimer = null;
              pingBtn.disabled = false;
              // reload so freshly discovered rows appear in the grid
              if (p.state === 'done') setTimeout(() => window.location.reload(), 1500);
            }
          })
          .catch(() => {});
      }

      pingBtn.addEventListener('click', () => {
        pingBtn.disabled = true;
        document.getElementById('pingStatus').textContent = 'starting…';
        fetch('/api/pingnetwork', { method: 'POST' })
          .then(r => r.json())
          .then(() => { if (!pingTimer) pingTimer = setInterval(pollPing, 500); })
          .catch(() => {
            pingBtn.disabled = false;
            document.getElementById('pingStatus').textContent = 'could not start scan';
          });
      });

      // A scan may already be running (started elsewhere / page reloaded
      // mid-scan) — pick its progress bar back up.
      fetch('/api/pingnetwork/status')
        .then(r => r.json())
        .then(p => {
          if (p.state === 'sweeping' || p.state === 'identifying') {
            pingBtn.disabled = true;
            renderPingStatus(p);
            pingTimer = setInterval(pollPing, 500);
          }
        })
        .catch(() => {});
      function addButton() {
      // Select the element next to which the button should be added
          var element = document.querySelector("div.gridjs-search");

      // Create a new button element
          var button = document.createElement("input");
          button.textContent = "Click me";
          button.className = "btn btn-primary";
          button.setAttribute("type","submit") 
          button.setAttribute("value","Add New Row")
          button.style = "float: right; margin-right: 100px";
                    button.onclick = async function() { // Make the function asynchronous
              try {
                  const response = await fetch('/api/serveripaddrow', { // Await the fetch call
                      method: 'POST',
                      headers: {'Content-Type': 'application/json'},
                      // If you need to send data in the POST request body:
                      // body: JSON.stringify({ key: 'value' }),
                  });

                  if (!response.ok) {
                      // Handle HTTP errors (e.g., 404, 500)
                      console.error(`HTTP error! Status: ${response.status}`);
                      // You might want to display a user-friendly error message here
                      // Instead of alert, use a custom modal or update a div
                      // alert(`Failed to add row: ${response.status}`);
                  } else {
                      // Request was successful
                      console.log('Row added successfully!');
                      // You can optionally parse the response if the server sends back data
                      // const data = await response.json();
                      // console.log('Response data:', data);
                  }
              } catch (error) {
                  // Handle network errors or other issues during fetch
                  console.error('Error during fetch operation:', error);
                  // Display a user-friendly error message
                  // alert('An error occurred while trying to add a new row.');
              }
          // button.onclick = function() {
          //     //alert("Button clicked!");
          //     fetch('/api/serveripaddrow', {
          //     method: 'GET',
          //     headers: {'Content-Type': 'application/json'},
          //     });
              window.location.reload();
          }
          element.parentNode.insertBefore(button, element.nextSibling);
      }
      class Dropdown {
          constructor() {
              this.items = [];
          }
          // Method to add an item with an ID to the dropdown list
          addItem(id, item) {
              this.items.push({ id, item });
          }
          // Method to retrieve the list of items in the dropdown
          getItems() {
              return this.items;
          }
          //Method to populate the dropdown element
          populateDropdown(dropdownElement) {
              //const dropdownElement = document.getElementById(dropdownElementId);
              if (!dropdownElement) {
                  console.error(`Element with id ${dropdownElementId} not found.`);
                  return;
              }

              // Clear existing options
              dropdownElement.innerHTML = '';

              // Add new options
              this.items.forEach(({ id, item }) => {
                  const option = document.createElement('option');
                  option.value = id;
                  option.textContent = item;
                  dropdownElement.appendChild(option);
              });
          }
      }      
      
      const activeDD = [
        { value: "1", label: "Yes" },
        { value: "0", label: "No" }
      ];

 
      const serverRoleDD = new Dropdown
      fetch('/api/serverrole')
      .then(response => response.json())
      .then(data => {
        for (const item of data.data) {
          serverRoleDD.addItem(item.ID, item.name)
        }
      })
      .catch(error => {
        console.error('Error fetching data:', error);
      });

      const ledmodeltypeDD = new Dropdown
      fetch('/api/ledtypemodel')
      .then(response => response.json())
      .then(data => {
        for (const item of data.data) {
          ledmodeltypeDD.addItem(item.ledTypeModel_ID, item.modelName)
        }
      })
      .catch(error => {
        console.error('Error fetching data:', error);
      });

      const updateUrl = (prev, query) => {
        return prev + (prev.indexOf('?') >= 0 ? '&' : '?') + new URLSearchParams(query).toString();
      };

      const editableCellAttributes = (data, row, col) => {
          if (row) {
            return {contentEditable: 'true', 'data-element-id': row.cells[0].data};
          }
          else {
            return {};
          }
      };

      // # 0    ServerIP_ID   INTEGER  0                    1 
      // # 1    serverName    TEXT     0                    0 
      // # 2    ipAddress     TEXT     0                    0 
      // # 3    ports         TEXT     0                    0 
      // # 4    active        INT      0                    0 
      // # 5    PingTime      TEXT     0                    0 
      // # 6    serverroleid  INT      0                    0 
      // Order MUST match the visual columns array below — the sort handler maps a
      // clicked column's index into this list. 'version' sits right after the name.
      const tblColumns = ['ServerIP_ID','serverName', 'version', 'ipAddress', 'ports','active','PingTime','serverroleid']
      const primeKey = tblColumns[0]
      new gridjs.Grid({
        columns: [
          { id: 'ServerIP_ID', name: 'ServerIP_ID', 'hidden': true },
          { id: 'serverName', name: 'Server Name', sort: true, 'attributes': editableCellAttributes },
          { id: 'version', name: 'Version', sort: true },
          { id: 'ipAddress', name: 'IP Address' , sort: true, 'attributes': editableCellAttributes  },
          { id: 'ports', name: 'Ports', sort: false },
          { id: 'active', name: 'active', sort: false,
          formatter: function (cellData, row) { 
              const selectedValue = cellData
              const active = document.createElement("select");
              activeDD.forEach((data) => {
                var el = document.createElement("option");
                el.textContent = data.label
                el.value = data.value
                active.appendChild(el)
              })
              active.name = "active"
              active.id = "activeOpt_" + row.cells[5].data.toString() + "_ID_" + row.cells[0].data.toString()
              active.setAttribute("onchange","activeChange()")
              active.childNodes.forEach((node) => {
                if(parseInt(node.value)===parseInt(row.cells[5].data)){
                  node.outerHTML = node.outerHTML.toString().replace("<option","<option selected")
                }
              });
              return gridjs.html(active.outerHTML);
              } 
          },
          { id: 'PingTime', name: 'PingTime', sort: true },
          { id: 'serverroleid', name: 'serverroleid', sort: false
            ,
            formatter: function (cellData, row) {
              const selectedValue = cellData
              // Fall back to role 1 ("None") when serverroleid is null/undefined —
              // otherwise .toString() below throws and the whole grid fails to render.
              const roleId = (row.cells[7].data == null) ? 1 : row.cells[7].data
              const serverrole = document.createElement("select");
              serverRoleDD.populateDropdown(serverrole)
              serverrole.name = "serverrole"
              serverrole.id = "serverroleOpt_" + roleId.toString() + "_ID_" + row.cells[0].data.toString()
              serverrole.setAttribute("onchange","serverRoleChange()")
              serverrole.childNodes.forEach((node) => {
                if(parseInt(node.value)===parseInt(roleId)){
                  node.outerHTML = node.outerHTML.toString().replace("<option","<option selected")
                }
              });
              return gridjs.html(serverrole.outerHTML);
              }
          },
          {id: 'dlete', name: 'Del', sort: false,
          formatter: function (cellData, row) {
              // Multi-select delete: checkbox feeds the shared Set in site.js;
              // "Delete Selected" posts each id to the single-delete endpoint.
              return gridjs.html(spCheckHtml(row.cells[0].data));
              }
          },
        ],
        server: {
          url: '/api/serverIP',
          then: results => results.data,
          total: results => results.total,
        },
        search: {
          enabled: true,
          server: {
            url: (prev, search) => {
              return updateUrl(prev, {search});
            },
          },
        },
        sort: {
          enabled: true,
          multiColumn: true,
          server: {
            url: (prev, columns) => {
              const columnIds = tblColumns;
              const sort = columns.map(col => (col.direction === 1 ? '+' : '-') + columnIds[col.index]);
              return updateUrl(prev, {sort});
            },
          },
        },
        pagination: {
          enabled: true,
          server: {
            url: (prev, page, limit) => {
              return updateUrl(prev, {start: page * limit, length: limit});
            },
          },
        },
      }).render(tableDiv);
      spInitBulkDelete('/api/serveripdelrow', primeKey);

      let savedValue;

      tableDiv.addEventListener('focusin', ev => {
        if (ev.target.tagName === 'TD') {
          savedValue = ev.target.textContent;
        }
      });

      tableDiv.addEventListener('focusout', ev => {
        if (ev.target.tagName === 'TD') {
          if (savedValue !== ev.target.textContent) {
            saveChange(JSON.stringify({[primeKey]: ev.target.dataset.elementId,[ev.target.dataset.columnId]: ev.target.textContent
              }))
          }
          savedValue = undefined;
        }
      });

      function saveChange(json){
        //console.log(json)
        fetch('/api/serverIP', {
              method: 'POST',
              headers: {'Content-Type': 'application/json'},
              body: json,
            });
      }

      function serverRoleChange(){
        var ev = event.target;
        id = ev.id.split("_ID_")
        if(ev.id.toString().includes("serverroleOpt_")){
          jsn = {[primeKey]:id[1],['serverroleid']:ev.value}
          console.log(JSON.stringify(jsn))
          saveChange(JSON.stringify(jsn))
          if (ev.value == "4") { //4 = WLED Server
            if (confirm('Update the Support tables?')) {
              json = JSON.stringify({[primeKey]:id[1]})
              console.log(json)

              fetch('/updateWLEDSupport', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: json,
              });
            }
          }
          //console.log("Selected " + ev.value);
        }
      }

      function modelChange(){
        var ev = event.target;
        id = ev.id.split("_ID_")
        //console.log(elnt)
        if(ev.id.toString().includes("selectModelOpt_")){
          jsn = {[primeKey]:id[1],ledTypeModel_ID:ev.value}
          console.log(JSON.stringify(jsn))
          saveChange(JSON.stringify(jsn))
          //console.log("Selected " + ev.value);
        }
      }


      function activeChange(){
        var ev = event.target;
        id = ev.id.split("_ID_")
        if(ev.id.toString().includes("activeOpt_")){
          jsn = {[primeKey]:id[1],active:ev.value}
          console.log(JSON.stringify(jsn))
          saveChange(JSON.stringify(jsn))
          //console.log("Selected " + ev.value);
        }
      }
    
      tableDiv.addEventListener('keydown', ev => {
        if (ev.target.tagName === 'TD') {
          if (ev.key === 'Escape') {
            ev.target.textContent = savedValue;
            ev.target.blur();
          }
          else if (ev.key === 'Enter') {
            ev.preventDefault();
            ev.target.blur();
          }
        }
      });

      //   if (confirm('Are you sure you want to DELETE?')) {
      //   var ev = event.target;
      //   id = ev.id.split("_ID_")
      //   if(ev.id.toString().includes("Dlete_")){
      //     jsn = {[primeKey]:id[1]}
      //     console.log(JSON.stringify(jsn))

      //       console.log(JSON.stringify(jsn))

      //   }
      // }

    </script>
  </body>
  {% endblock %}
